services:

  # ─── Reverse Proxy ────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: swiss-truth-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - n8n
    networks:
      - swiss-truth-net

  # ─── Neo4j ────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    container_name: swiss-truth-neo4j
    restart: unless-stopped
    # Nicht nach aussen exponiert — nur intern erreichbar
    expose:
      - "7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      # Memory Tuning für VPS-8 (8 GB RAM)
      NEO4J_server_memory_heap_initial__size: 1g
      NEO4J_server_memory_heap_max__size: 2g
      NEO4J_server_memory_pagecache_size: 1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - swiss-truth-net

  # ─── Swiss Truth API ──────────────────────────────────────────────────────
  api:
    image: swiss-truth-api:latest
    container_name: swiss-truth-api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      SWISS_TRUTH_API_KEY: ${SWISS_TRUTH_API_KEY}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      NGROK_PUBLIC_URL: ""   # Kein ngrok in Prod — Caddy übernimmt
      PUBLIC_BASE_URL: https://${DOMAIN}
    volumes:
      # Live-Mount: rsync → /opt/swiss-truth/src/ genügt für Updates (kein docker cp mehr)
      - /opt/swiss-truth/src/swiss_truth_mcp:/app/src/swiss_truth_mcp
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - swiss-truth-net

  # ─── n8n ──────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: swiss-truth-n8n
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      N8N_HOST: n8n.${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.${DOMAIN}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      DB_TYPE: sqlite
      GENERIC_TIMEZONE: Europe/Zurich
      N8N_METRICS: true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - swiss-truth-net

networks:
  swiss-truth-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  n8n_data:
  caddy_data:
  caddy_config:
