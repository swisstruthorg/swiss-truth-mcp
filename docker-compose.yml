services:
  neo4j:
    image: neo4j:5.26-community
    container_name: swiss-truth-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-swisstruth2026}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build: .
    container_name: swiss-truth-api
    command: swiss-truth-api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-swisstruth2026}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SWISS_TRUTH_API_KEY: ${SWISS_TRUTH_API_KEY:-dev-key-change-in-prod}
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
