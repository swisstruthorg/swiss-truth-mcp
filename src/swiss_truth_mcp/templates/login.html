<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swiss Truth — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7; color: #1d1d1f;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border: 1px solid #d2d2d7; border-radius: 18px;
      padding: 40px 44px; width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 18px; margin-bottom: 32px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #d00, #900);
      border-radius: 10px; flex-shrink: 0;
    }
    .logo-sub { font-size: 12px; color: #6e6e73; font-weight: 400; margin-top: 1px; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #6e6e73; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 10px 14px; border: 1px solid #d2d2d7;
      border-radius: 10px; font-size: 15px; font-family: inherit;
      background: #fafafa; color: #1d1d1f; margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: #007aff; background: #fff; box-shadow: 0 0 0 3px rgba(0,122,255,0.12); }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: #1d1d1f; color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 4px; transition: background 0.15s;
    }
    .btn:hover { background: #333; }
    .error {
      background: #fff0f0; border: 1px solid #ffc0c0; color: #c0392b;
      padding: 10px 14px; border-radius: 10px; font-size: 13px;
      margin-bottom: 20px; text-align: center;
    }
    .footer { text-align: center; font-size: 11px; color: #aeaeb2; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"></div>
      <div>
        Swiss Truth
        <div class="logo-sub">Expert Review Platform</div>
      </div>
    </div>

    <h2>Anmelden</h2>
    <p class="subtitle">Zugang nur für autorisierte Reviewer</p>

    {% if error %}
      <div class="error">Ungültige Anmeldedaten. Bitte versuche es erneut.</div>
    {% endif %}

    <form method="post" action="/login">
      <label for="username">Benutzername</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus required>

      <label for="password">Passwort</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit" class="btn">Anmelden</button>
    </form>

    <div class="footer">🇨🇭 Swiss Truth · swisstruth.org</div>
  </div>
</body>
</html>
