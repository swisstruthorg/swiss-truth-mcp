version: "3.8"

# Local integration test environment
# Usage: docker compose -f tests/docker-compose.test.yml up -d
#        NEO4J_PASSWORD=testpassword123 pytest tests/test_integration.py -v
#        docker compose -f tests/docker-compose.test.yml down

services:
  neo4j-test:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/testpassword123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7687:7687"
      - "7474:7474"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "testpassword123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
