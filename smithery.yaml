# Swiss Truth MCP — Smithery Configuration
# https://smithery.ai/docs/build/publish
#
# Metadata (name, description, tags, icon) must be set on smithery.ai directly.
# This file only controls the technical connection.

startCommand:
  type: http
  url: https://swisstruth.org/mcp
  # Optional API key — needed only for submit_claim.
  # Read-only tools (search, verify, list_domains, find_contradictions) work without a key.
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "Swiss Truth API key — needed for submit_claim. Leave empty for read-only access."
        default: ""
    required: []
  exampleConfig:
    apiKey: ""
